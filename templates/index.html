<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Folio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0c0b;--surface:#141210;--panel:#1a1714;
  --border:#2a2520;--border2:#3a322a;
  --text:#c9bfb0;--dim:#6b6058;--muted:#8a7d72;
  --gold:#b8956a;--gold-dim:#7a6040;--red:#8b3a3a;
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--serif);font-size:18px;overflow:hidden}

/* ── Shell ── */
.app{display:grid;grid-template-columns:270px 1fr;grid-template-rows:52px 1fr;height:100vh}

/* ── Header ── */
header{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:0 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.wordmark{font-size:1.3rem;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-style:italic}
.hdr-right{display:flex;align-items:center;gap:10px}
.view-tabs{display:flex;gap:2px;background:var(--bg);border-radius:3px;padding:3px}
.view-tab{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:2px;border:none;background:transparent;color:var(--dim);cursor:pointer;transition:all .2s}
.view-tab.active{background:var(--panel);color:var(--gold)}
.view-tab:hover:not(.active){color:var(--muted)}

/* ── Sidebar ── */
aside{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-sec{padding:13px 15px 11px;border-bottom:1px solid var(--border)}
.sb-lbl{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:7px}
input,textarea,select{font-family:var(--mono);font-size:.72rem}
input[type=search],input[type=text]{width:100%;background:var(--panel);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:3px;outline:none}
input[type=search]:focus,input[type=text]:focus{border-color:var(--gold-dim)}
input::placeholder{color:var(--dim)}
input[type=date]{width:100%;background:var(--panel);border:1px solid var(--gold-dim);color:var(--gold);padding:8px 10px;border-radius:3px;outline:none;cursor:pointer}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5) sepia(1) saturate(3) hue-rotate(5deg);cursor:pointer}
select{width:100%;background:var(--panel);border:1px solid var(--border2);color:var(--text);padding:7px 10px;border-radius:3px;outline:none;cursor:pointer;margin-bottom:7px}
select:focus{border-color:var(--gold-dim)}
textarea{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);padding:6px 0 8px;outline:none;resize:none;font-family:var(--serif);transition:border-color .2s}
textarea:focus{border-bottom-color:var(--gold-dim)}
.sort-pills{display:flex;gap:5px}
.pill{flex:1;font-family:var(--mono);font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;padding:5px 6px;border-radius:2px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;text-align:center}
.pill:hover{border-color:var(--gold-dim);color:var(--gold)}
.pill.active{background:var(--gold-dim);border-color:var(--gold-dim);color:var(--bg)}
.entry-list{flex:1;overflow-y:auto}
.entry-list::-webkit-scrollbar{width:3px}
.entry-list::-webkit-scrollbar-thumb{background:var(--border2)}
.grp-hdr{font-family:var(--mono);font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);padding:9px 15px 5px;background:var(--bg);border-bottom:1px solid var(--border)}
.entry-item{padding:11px 15px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
.entry-item:hover{background:var(--panel)}
.entry-item.active{background:var(--panel)}
.entry-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold)}
.ei-title{font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ei-meta{font-family:var(--mono);font-size:.57rem;color:var(--dim);margin-top:3px;display:flex;gap:5px;flex-wrap:wrap}
.ei-tag{color:var(--gold-dim)}
.no-entries{padding:20px 15px;font-family:var(--mono);font-size:.63rem;color:var(--dim);text-align:center}

/* ── Main ── */
main{overflow:hidden;display:flex;flex-direction:column;position:relative}
.view{display:none;flex:1;overflow:hidden;flex-direction:column}
.view.active{display:flex}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);gap:12px}
.empty-glyph{font-size:3rem;opacity:.1;font-style:italic}
.empty-state p{font-family:var(--mono);font-size:.63rem;letter-spacing:.15em;text-transform:uppercase}

/* ── Detail / Form scroll containers ── */
.scroll-wrap{flex:1;overflow-y:auto;padding:34px 46px}
.scroll-wrap::-webkit-scrollbar{width:3px}
.scroll-wrap::-webkit-scrollbar-thumb{background:var(--border2)}
.scroll-wrap>*{max-width:760px;margin:0 auto}

/* ── Detail ── */
.detail-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.chips{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.chip{font-family:var(--mono);font-size:.58rem;padding:3px 8px;border:1px solid var(--border2);border-radius:2px;color:var(--gold-dim)}
.detail-actions{display:flex;gap:7px}
.detail-title{font-size:2.3rem;font-weight:300;font-style:italic;line-height:1.2;margin-bottom:22px}
.detail-body{font-size:1rem;font-weight:300;line-height:1.9;color:var(--muted);white-space:pre-wrap}

/* ── Track map in detail ── */
.track-map-wrap{margin-top:28px}
.track-map-label{font-family:var(--mono);font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.track-map-label span{color:var(--gold-dim)}
.track-map{height:260px;border-radius:4px;border:1px solid var(--border2)}
.track-list{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.track-item{display:flex;align-items:center;justify-content:space-between;background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:8px 12px;font-family:var(--mono);font-size:.63rem;color:var(--muted)}
.track-item-name{color:var(--text)}
.track-item-dist{color:var(--gold-dim)}

/* ── Photos ── */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-top:28px}
.photo-thumb{position:relative;aspect-ratio:1;overflow:hidden;border-radius:3px;border:1px solid var(--border);cursor:pointer}
.photo-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s;display:block}
.photo-thumb:hover img{transform:scale(1.05)}
.photo-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.78);border:none;color:#fff;width:20px;height:20px;border-radius:50%;font-size:.62rem;cursor:pointer;display:none;align-items:center;justify-content:center}
.photo-thumb:hover .photo-del{display:flex}
.drop-area{border:1px dashed var(--border2);border-radius:3px;padding:14px;text-align:center;font-family:var(--mono);font-size:.63rem;color:var(--dim);cursor:pointer;transition:border-color .2s;margin-top:10px}
.drop-area:hover,.drop-area.drag-over{border-color:var(--gold-dim);color:var(--gold)}
.drop-area input{display:none}

/* ── GPX upload drop ── */
.gpx-drop{border:1px dashed var(--gold-dim);border-radius:3px;padding:12px 14px;text-align:center;font-family:var(--mono);font-size:.63rem;color:var(--gold-dim);cursor:pointer;transition:all .2s;margin-top:10px}
.gpx-drop:hover,.gpx-drop.drag-over{background:rgba(184,149,106,.07);color:var(--gold)}
.gpx-drop input{display:none}

/* ── Form ── */
.f-lbl{font-family:var(--mono);font-size:.57rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:5px}
.f-field{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:var(--serif);padding:5px 0 7px;margin-bottom:20px;outline:none;font-size:1rem;transition:border-color .2s;border-radius:0}
.f-field:focus{border-bottom-color:var(--gold-dim)}
.f-title{font-size:1.9rem;font-style:italic;font-weight:300}
.f-body{min-height:190px;font-weight:300;line-height:1.85;margin-bottom:20px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.f-date-wrap{margin-bottom:20px}
.f-date-lbl{font-family:var(--mono);font-size:.57rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);display:block;margin-bottom:5px}
.f-actions{display:flex;gap:9px;margin-top:4px;flex-wrap:wrap;align-items:center}

/* location picker */
.loc-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end;margin-bottom:6px}
.loc-coords{font-family:var(--mono);font-size:.58rem;color:var(--dim);min-height:13px}
#pick-map{height:200px;border-radius:3px;border:1px solid var(--border2);margin-top:8px;display:none;margin-bottom:20px}
#pick-map.visible{display:block}

/* ── World map ── */
#view-map{position:relative}
#world-map{width:100%;height:100%}
.map-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--dim);gap:10px;pointer-events:none}
.map-empty p{font-family:var(--mono);font-size:.63rem;letter-spacing:.15em;text-transform:uppercase}

/* ── Buttons ── */
.btn{font-family:var(--mono);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;padding:7px 15px;border-radius:2px;border:1px solid var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:all .18s}
.btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.btn-gold{background:var(--gold-dim);border-color:var(--gold-dim);color:var(--bg)}
.btn-gold:hover{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:5px 10px;font-size:.57rem}

/* ── Lightbox ── */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);display:flex;align-items:center;justify-content:center;z-index:9999;cursor:zoom-out}
.lightbox.hidden{display:none}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:3px}

/* ── Toast ── */
.toast{position:fixed;bottom:18px;right:18px;background:var(--panel);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:.63rem;padding:8px 15px;border-radius:3px;z-index:9998;opacity:0;transform:translateY(5px);transition:all .22s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* Leaflet dark theme */
.leaflet-container{background:#0d0c0b;font-family:var(--mono)}
.leaflet-popup-content-wrapper{background:var(--panel);border:1px solid var(--border2);border-radius:3px;box-shadow:0 4px 20px rgba(0,0,0,.6);color:var(--text)}
.leaflet-popup-tip{background:var(--panel)}
.leaflet-popup-close-button{color:var(--dim)!important}
.map-popup-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;color:#c9bfb0;margin-bottom:2px}
.map-popup-meta{font-family:'DM Mono',monospace;font-size:.58rem;color:#8a7d72;margin-bottom:5px}
.map-popup-dist{font-family:'DM Mono',monospace;font-size:.58rem;color:#b8956a}
.map-popup-link{font-family:'DM Mono',monospace;font-size:.58rem;color:#b8956a;cursor:pointer;text-decoration:underline;margin-top:4px;display:inline-block}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="wordmark">Folio</div>
  <div class="hdr-right">
    <div class="view-tabs">
      <button class="view-tab active" data-view="list">☰ Journal</button>
      <button class="view-tab" data-view="map">⬡ Map</button>
    </div>
    <button class="btn btn-gold btn-sm" id="btn-new">+ New Entry</button>
  </div>
</header>

<aside>
  <div class="sb-sec">
    <div class="sb-lbl">Search</div>
    <input type="search" id="search-input" placeholder="Search…">
  </div>
  <div class="sb-sec">
    <div class="sb-lbl">Sort by</div>
    <div class="sort-pills">
      <button class="pill active" data-sort="date">Date</button>
      <button class="pill" data-sort="event">Event</button>
      <button class="pill" data-sort="place">Place</button>
    </div>
  </div>
  <div class="sb-sec">
    <div class="sb-lbl">Filter</div>
    <select id="filter-event"><option value="">All events</option></select>
    <select id="filter-place"><option value="">All places</option></select>
    <button class="btn btn-sm" id="btn-clear" style="width:100%">Clear filters</button>
  </div>
  <div class="entry-list" id="entry-list"><div class="no-entries">No entries yet</div></div>
</aside>

<main>
  <div class="view active" id="view-list">
    <div class="empty-state"><div class="empty-glyph">✦</div><p>Select or create an entry</p></div>
  </div>
  <div class="view" id="view-map">
    <div id="world-map"></div>
    <div class="map-empty" id="map-empty" style="display:none">
      <div class="empty-glyph">⬡</div><p>No mapped entries yet</p>
    </div>
  </div>
</main>
</div>

<div class="lightbox hidden" id="lightbox"><img id="lb-img" src="" alt=""></div>
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let entries=[], activeId=null, sort='date', filterEvent='', filterPlace='', searchQ='';
let worldMap=null, worldLayers=[], pickMap=null, pickMarker=null;
let currentView='list';
let detailTrackMap=null;

// ── API ────────────────────────────────────────────────────────────────────
const api={
  get:    u      =>fetch(u).then(r=>r.json()),
  post:   (u,d)  =>fetch(u,{method:'POST',  headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()),
  put:    (u,d)  =>fetch(u,{method:'PUT',   headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()),
  del:    u      =>fetch(u,{method:'DELETE'}).then(r=>r.json()),
  upload: (u,fd) =>fetch(u,{method:'POST',  body:fd}).then(r=>r.json()),
};

// ── Load ───────────────────────────────────────────────────────────────────
async function loadEntries(){
  const p=new URLSearchParams({sort,event:filterEvent,place:filterPlace,search:searchQ});
  entries=await api.get(`/api/entries?${p}`);
  renderSidebar(); await loadMeta();
  if(currentView==='map') refreshWorldMap();
}
async function loadMeta(){
  const [evs,pls]=await Promise.all([api.get('/api/meta/events'),api.get('/api/meta/places')]);
  const ev=document.getElementById('filter-event').value, pl=document.getElementById('filter-place').value;
  document.getElementById('filter-event').innerHTML='<option value="">All events</option>'+evs.map(e=>`<option>${e}</option>`).join('');
  document.getElementById('filter-place').innerHTML='<option value="">All places</option>'+pls.map(p=>`<option>${p}</option>`).join('');
  document.getElementById('filter-event').value=ev; document.getElementById('filter-place').value=pl;
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar(){
  const list=document.getElementById('entry-list');
  if(!entries.length){list.innerHTML='<div class="no-entries">No entries found</div>';return;}
  let html='', lastGroup=null;
  entries.forEach(e=>{
    const group=sort==='event'?(e.event||'—'):sort==='place'?(e.place||'—'):(e.entry_date||'—').slice(0,7);
    if(group!==lastGroup){html+=`<div class="grp-hdr">${sort==='date'?fmtMonth(group):group}</div>`;lastGroup=group;}
    const hasTrack=e.tracks&&e.tracks.length>0, hasPin=e.lat&&e.lng;
    const icons=(hasTrack?'〜':'')+((hasPin&&!hasTrack)?'⬡':'');
    html+=`<div class="entry-item${e.id===activeId?' active':''}" data-id="${e.id}">
      <div class="ei-title">${esc(e.title)}${icons?` <span style="color:var(--gold-dim);font-size:.6rem">${icons}</span>`:''}</div>
      <div class="ei-meta"><span>${fmtDate(e.entry_date)}</span>
        ${e.place?`<span class="ei-tag">📍 ${esc(e.place)}</span>`:''}
        ${e.event?`<span class="ei-tag">◆ ${esc(e.event)}</span>`:''}
      </div>
    </div>`;
  });
  list.innerHTML=html;
  list.querySelectorAll('.entry-item').forEach(el=>el.addEventListener('click',()=>{switchToListView();openEntry(el.dataset.id);}));
}

// ── Detail ─────────────────────────────────────────────────────────────────
async function openEntry(id){
  activeId=id; detailTrackMap=null;
  renderSidebar();
  const e=await api.get(`/api/entries/${id}`);

  const chips=[
    `<span class="chip">${fmtDate(e.entry_date)}</span>`,
    e.event?`<span class="chip">◆ ${esc(e.event)}</span>`:'',
    e.place?`<span class="chip">📍 ${esc(e.place)}</span>`:'',
    (e.tracks&&e.tracks.length)?`<span class="chip">〜 ${e.tracks.length} track${e.tracks.length>1?'s':''}</span>`:'',
    (e.lat&&e.lng&&!(e.tracks&&e.tracks.length))?`<span class="chip">⬡ mapped</span>`:'',
  ].filter(Boolean).join('');

  const photos=e.photos.map(p=>`
    <div class="photo-thumb">
      <img src="${p.url}" alt="${esc(p.original_name||'')}" loading="lazy" onclick="openLB('${p.url}')">
      <button class="photo-del" onclick="delPhoto('${p.id}','${id}',event)">✕</button>
    </div>`).join('');

  // Track section
  let trackSection='';
  if(e.tracks&&e.tracks.length){
    const trackItems=e.tracks.map(t=>`
      <div class="track-item" id="ti-${t.id}">
        <span class="track-item-name">${esc(t.track_name||t.original_name||'Track')}</span>
        <span class="track-item-dist">${t.distance_km?t.distance_km+' km':''}</span>
        <button class="btn btn-sm btn-danger" onclick="delTrack('${t.id}','${id}',event)" style="margin-left:12px">✕</button>
      </div>`).join('');
    trackSection=`
      <div class="track-map-wrap">
        <div class="track-map-label">
          GPS Tracks
          <span>${e.tracks.map(t=>t.distance_km?t.distance_km+' km':'').filter(Boolean).join(' + ')}</span>
        </div>
        <div class="track-map" id="detail-track-map-${id}"></div>
        <div class="track-list">${trackItems}</div>
      </div>`;
  }

  setListContent(`<div class="scroll-wrap"><div>
    <div class="detail-top">
      <div class="chips">${chips}</div>
      <div class="detail-actions">
        <button class="btn btn-sm" onclick="openEditForm('${id}')">✎ Edit</button>
        <button class="btn btn-sm btn-danger" onclick="delEntry('${id}')">✕</button>
      </div>
    </div>
    <div class="detail-title">${esc(e.title)}</div>
    <div class="detail-body">${esc(e.body||'')}</div>
    ${trackSection}
    <div class="photo-grid" id="pg-${id}">${photos}</div>
    <div class="drop-area" id="drop-img-${id}">
      <input type="file" id="fi-${id}" accept="image/*" multiple>
      Drop photos here or click to upload
    </div>
    <div class="gpx-drop" id="drop-gpx-${id}">
      <input type="file" id="fg-${id}" accept=".gpx">
      〜 Drop a GPX file here to attach a track
    </div>
  </div></div>`);

  // Wire photo upload
  wireDropArea(`drop-img-${id}`, `fi-${id}`, files=>uploadFiles(id,files));
  // Wire GPX upload
  const gpxDrop=document.getElementById(`drop-gpx-${id}`);
  const gpxInput=document.getElementById(`fg-${id}`);
  gpxDrop.addEventListener('click',()=>gpxInput.click());
  gpxDrop.addEventListener('dragover',ev=>{ev.preventDefault();gpxDrop.classList.add('drag-over');});
  gpxDrop.addEventListener('dragleave',()=>gpxDrop.classList.remove('drag-over'));
  gpxDrop.addEventListener('drop',async ev=>{ev.preventDefault();gpxDrop.classList.remove('drag-over');await uploadGpx(id,ev.dataTransfer.files[0]);});
  gpxInput.addEventListener('change',async()=>await uploadGpx(id,gpxInput.files[0]));

  // Render track map
  if(e.tracks&&e.tracks.length){
    setTimeout(()=>renderDetailTrackMap(id,e.tracks),80);
  }
}

function renderDetailTrackMap(entryId, tracks){
  const el=document.getElementById(`detail-track-map-${entryId}`);
  if(!el||detailTrackMap) return;
  const m=L.map(el,{zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(m);
  detailTrackMap=m;

  const allPts=[];
  tracks.forEach((t,i)=>{
    if(!t.points||!t.points.length) return;
    const color=i===0?'#b8956a':'#8a7d72';
    L.polyline(t.points,{color,weight:2.5,opacity:.85}).addTo(m);
    // start/end markers
    const s=t.points[0], e=t.points[t.points.length-1];
    L.circleMarker(s,{radius:5,fillColor:'#b8956a',color:'#7a6040',weight:1.5,fillOpacity:1}).addTo(m)
      .bindTooltip('Start',{permanent:false});
    L.circleMarker(e,{radius:5,fillColor:'#c9bfb0',color:'#6b6058',weight:1.5,fillOpacity:1}).addTo(m)
      .bindTooltip('End',{permanent:false});
    t.points.forEach(p=>allPts.push(p));
  });
  if(allPts.length) m.fitBounds(L.latLngBounds(allPts),{padding:[20,20]});
}

async function uploadFiles(id,files){
  if(!files||!files.length) return;
  const fd=new FormData();
  [...files].forEach(f=>fd.append('photos',f));
  const saved=await api.upload(`/api/entries/${id}/photos`,fd);
  toast(`Uploaded ${saved.length} photo${saved.length!==1?'s':''}`);
  openEntry(id);
}

async function uploadGpx(id,file){
  if(!file) return;
  toast('Parsing GPX…');
  const fd=new FormData(); fd.append('gpx',file);
  const res=await api.upload(`/api/entries/${id}/tracks`,fd);
  if(res.error){toast(`Error: ${res.error}`);return;}
  toast(`Track loaded — ${res.distance_km?res.distance_km+' km':res.points.length+' pts'}`);
  await loadEntries();
  openEntry(id);
}

async function delPhoto(pid,eid,ev){
  ev.stopPropagation();
  if(!confirm('Delete photo?')) return;
  await api.del(`/api/photos/${pid}`); toast('Photo deleted'); openEntry(eid);
}

async function delTrack(tid,eid,ev){
  ev.stopPropagation();
  if(!confirm('Remove this track?')) return;
  detailTrackMap=null;
  await api.del(`/api/tracks/${tid}`); toast('Track removed');
  await loadEntries(); openEntry(eid);
}

async function delEntry(id){
  if(!confirm('Delete this entry and all its photos and tracks?')) return;
  await api.del(`/api/entries/${id}`); activeId=null; detailTrackMap=null;
  toast('Entry deleted'); await loadEntries(); showEmpty();
}

// ── Forms ─────────────────────────────────────────────────────────────────
function openNewForm(){activeId=null;renderSidebar();renderForm({title:'',body:'',event:'',place:'',entry_date:today(),lat:null,lng:null},false);}
async function openEditForm(id){const e=await api.get(`/api/entries/${id}`);renderForm(e,true);}

function renderForm(e,isEdit){
  setListContent(`<div class="scroll-wrap"><form onsubmit="return false">
    <label class="f-lbl">Title</label>
    <input class="f-field f-title" id="f-title" placeholder="Give this entry a title…" value="${esc(e.title)}">

    <div class="f-date-wrap">
      <label class="f-date-lbl">Date — backdate freely</label>
      <input type="date" id="f-date" value="${e.entry_date||today()}">
    </div>

    <div class="f-row" style="margin-bottom:20px">
      <div>
        <label class="f-lbl">Event</label>
        <input class="f-field" id="f-event" placeholder="e.g. Road trip" value="${esc(e.event||'')}" style="margin-bottom:0">
      </div>
      <div>
        <label class="f-lbl">Place name</label>
        <input class="f-field" id="f-place" placeholder="e.g. Kelowna" value="${esc(e.place||'')}" style="margin-bottom:0">
      </div>
    </div>

    <label class="f-lbl">Entry</label>
    <textarea class="f-field f-body" id="f-body" placeholder="Write your thoughts…">${esc(e.body||'')}</textarea>

    <label class="f-lbl">Pin on map</label>
    <div class="loc-row">
      <div class="loc-coords" id="coord-display">${e.lat&&e.lng?`${e.lat.toFixed(5)}, ${e.lng.toFixed(5)}`:'No location set — or upload a GPX to auto-pin'}</div>
      <button type="button" class="btn btn-sm" id="btn-toggle-map">📍 Pick</button>
    </div>
    <input type="hidden" id="f-lat" value="${e.lat||''}">
    <input type="hidden" id="f-lng" value="${e.lng||''}">
    <div id="pick-map"></div>

    <div class="f-actions">
      <button type="button" class="btn btn-gold" onclick="${isEdit?`saveEdit('${e.id}')`:'saveNew()'}">
        ${isEdit?'Save changes':'Save entry'}
      </button>
      <button type="button" class="btn" onclick="${isEdit?`openEntry('${e.id}')`:'showEmpty()'}">Cancel</button>
      ${isEdit?`<button type="button" class="btn btn-sm btn-danger" style="margin-left:auto" onclick="delEntry('${e.id}')">Delete</button>`:''}
    </div>
  </form></div>`);

  setTimeout(()=>{
    const btn=document.getElementById('btn-toggle-map');
    const container=document.getElementById('pick-map');
    let shown=false;
    btn.addEventListener('click',()=>{
      shown=!shown; container.classList.toggle('visible',shown);
      btn.textContent=shown?'✕ Close':'📍 Pick';
      if(shown&&!pickMap){
        const iLat=parseFloat(document.getElementById('f-lat').value)||51;
        const iLng=parseFloat(document.getElementById('f-lng').value)||0;
        pickMap=L.map('pick-map').setView([iLat,iLng],e.lat?10:2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(pickMap);
        if(e.lat&&e.lng) pickMarker=L.circleMarker([e.lat,e.lng],pinStyle()).addTo(pickMap);
        pickMap.on('click',ev=>{
          const{lat,lng}=ev.latlng;
          document.getElementById('f-lat').value=lat;
          document.getElementById('f-lng').value=lng;
          document.getElementById('coord-display').textContent=`${lat.toFixed(5)}, ${lng.toFixed(5)}`;
          if(pickMarker) pickMap.removeLayer(pickMarker);
          pickMarker=L.circleMarker([lat,lng],pinStyle()).addTo(pickMap);
        });
      } else if(shown&&pickMap) setTimeout(()=>pickMap.invalidateSize(),50);
    });
  },60);
}

function getFd(){
  return{
    title:     document.getElementById('f-title').value.trim(),
    body:      document.getElementById('f-body').value.trim(),
    event:     document.getElementById('f-event').value.trim(),
    place:     document.getElementById('f-place').value.trim(),
    entry_date:document.getElementById('f-date').value,
    lat:       parseFloat(document.getElementById('f-lat').value)||null,
    lng:       parseFloat(document.getElementById('f-lng').value)||null,
  };
}
async function saveNew(){
  const d=getFd(); if(!d.title){toast('Please add a title');return;}
  pickMap=null;pickMarker=null;
  const entry=await api.post('/api/entries',d); toast('Entry created');
  await loadEntries(); openEntry(entry.id);
}
async function saveEdit(id){
  const d=getFd(); if(!d.title){toast('Please add a title');return;}
  pickMap=null;pickMarker=null;
  await api.put(`/api/entries/${id}`,d); toast('Saved');
  await loadEntries(); openEntry(id);
}

// ── World map ─────────────────────────────────────────────────────────────
function initWorldMap(){
  if(worldMap) return;
  worldMap=L.map('world-map').setView([30,10],2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(worldMap);
}
function refreshWorldMap(){
  initWorldMap();
  worldLayers.forEach(l=>worldMap.removeLayer(l)); worldLayers=[];
  const mapped=entries.filter(e=>(e.lat&&e.lng)||(e.tracks&&e.tracks.length));
  document.getElementById('map-empty').style.display=mapped.length?'none':'flex';

  mapped.forEach(e=>{
    const hasTracks=e.tracks&&e.tracks.length>0;
    if(hasTracks){
      e.tracks.forEach(t=>{
        if(!t.points||!t.points.length) return;
        const line=L.polyline(t.points,{color:'#b8956a',weight:2,opacity:.75}).addTo(worldMap);
        const distStr=t.distance_km?`${t.distance_km} km`:'';
        const tags=[e.place&&`📍 ${e.place}`,e.event&&`◆ ${e.event}`].filter(Boolean).join(' · ');
        line.bindPopup(`
          <div class="map-popup-title">${esc(e.title)}</div>
          <div class="map-popup-meta">${fmtDate(e.entry_date)}${tags?' · '+tags:''}</div>
          ${distStr?`<div class="map-popup-dist">〜 ${distStr}</div>`:''}
          <div class="map-popup-link" onclick="viewFromMap('${e.id}')">Open entry →</div>`,{maxWidth:240});
        worldLayers.push(line);
      });
      // start pin
      const s=e.tracks[0].points[0];
      if(s){
        const m=L.circleMarker(s,pinStyle(6)).addTo(worldMap);
        worldLayers.push(m);
      }
    } else if(e.lat&&e.lng){
      const m=L.circleMarker([e.lat,e.lng],pinStyle(8)).addTo(worldMap);
      const tags=[e.place&&`📍 ${e.place}`,e.event&&`◆ ${e.event}`].filter(Boolean).join(' · ');
      m.bindPopup(`
        <div class="map-popup-title">${esc(e.title)}</div>
        <div class="map-popup-meta">${fmtDate(e.entry_date)}${tags?' · '+tags:''}</div>
        <div class="map-popup-link" onclick="viewFromMap('${e.id}')">Open entry →</div>`,{maxWidth:220});
      worldLayers.push(m);
    }
  });
}

function viewFromMap(id){switchToListView();openEntry(id);}

// ── View switching ────────────────────────────────────────────────────────
function switchToListView(){
  currentView='list';
  document.getElementById('view-list').classList.add('active');
  document.getElementById('view-map').classList.remove('active');
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.view==='list'));
}
function switchToMapView(){
  currentView='map';
  document.getElementById('view-map').classList.add('active');
  document.getElementById('view-list').classList.remove('active');
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.toggle('active',t.dataset.view==='map'));
  setTimeout(()=>{initWorldMap();worldMap.invalidateSize();refreshWorldMap();},50);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function setListContent(html){document.getElementById('view-list').innerHTML=html;}
function showEmpty(){activeId=null;renderSidebar();setListContent(`<div class="empty-state"><div class="empty-glyph">✦</div><p>Select or create an entry</p></div>`);}
function pinStyle(r=8){return{radius:r,fillColor:'#b8956a',color:'#7a6040',weight:1.5,opacity:1,fillOpacity:.9};}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function fmtMonth(ym){if(!ym||ym==='—')return'—';const[y,m]=ym.split('-');return new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});}
function wireDropArea(dropId,inputId,cb){
  const d=document.getElementById(dropId),i=document.getElementById(inputId);
  d.addEventListener('click',()=>i.click());
  d.addEventListener('dragover',e=>{e.preventDefault();d.classList.add('drag-over');});
  d.addEventListener('dragleave',()=>d.classList.remove('drag-over'));
  d.addEventListener('drop',async e=>{e.preventDefault();d.classList.remove('drag-over');await cb(e.dataTransfer.files);});
  i.addEventListener('change',async()=>await cb(i.files));
}
let _t; function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_t);_t=setTimeout(()=>el.classList.remove('show'),2800);}

// ── Lightbox ──────────────────────────────────────────────────────────────
function openLB(url){document.getElementById('lb-img').src=url;document.getElementById('lightbox').classList.remove('hidden');}
document.getElementById('lightbox').addEventListener('click',()=>document.getElementById('lightbox').classList.add('hidden'));

// ── Events ────────────────────────────────────────────────────────────────
document.getElementById('btn-new').addEventListener('click',()=>{switchToListView();openNewForm();});
document.querySelectorAll('.view-tab').forEach(tab=>tab.addEventListener('click',()=>tab.dataset.view==='map'?switchToMapView():switchToListView()));
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));p.classList.add('active');sort=p.dataset.sort;loadEntries();}));
let _s; document.getElementById('search-input').addEventListener('input',e=>{clearTimeout(_s);searchQ=e.target.value.trim();_s=setTimeout(loadEntries,300);});
document.getElementById('filter-event').addEventListener('change',e=>{filterEvent=e.target.value;loadEntries();});
document.getElementById('filter-place').addEventListener('change',e=>{filterPlace=e.target.value;loadEntries();});
document.getElementById('btn-clear').addEventListener('click',()=>{filterEvent='';filterPlace='';document.getElementById('filter-event').value='';document.getElementById('filter-place').value='';loadEntries();});

loadEntries();
</script>
